naftiko: "1.0.0-alpha1"

info:
  label: "Azure Networking Services"
  description: "Azure Networking Services REST API for Azure resource management."
  tags:
    - Azure
    - Cloud
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AZURE_SUBSCRIPTION_ID: AZURE_SUBSCRIPTION_ID
      AZURE_ACCESS_TOKEN: AZURE_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: azure-networking-services
      baseUri: https://management.azure.com
      description: "Azure Networking Services REST API"
      authentication:
        type: bearer
        token: "{{AZURE_ACCESS_TOKEN}}"
      resources:
        - name: virtual-network
          path: /subscriptions/{subscriptionId}/providers/Microsoft.VirtualNetwork/VirtualNetworks
          description: "Manage VirtualNetwork resources"
          operations:
            - name: list-virtual-networks
              method: GET
              description: "List all VirtualNetwork resources"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Azure subscription ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: subnet
          path: /subscriptions/{subscriptionId}/providers/Microsoft.Subnet/Subnets
          description: "Manage Subnet resources"
          operations:
            - name: list-subnets
              method: GET
              description: "List all Subnet resources"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Azure subscription ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: load-balancer
          path: /subscriptions/{subscriptionId}/providers/Microsoft.LoadBalancer/LoadBalancers
          description: "Manage LoadBalancer resources"
          operations:
            - name: list-load-balancers
              method: GET
              description: "List all LoadBalancer resources"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Azure subscription ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: network-interface
          path: /subscriptions/{subscriptionId}/providers/Microsoft.NetworkInterface/NetworkInterfaces
          description: "Manage NetworkInterface resources"
          operations:
            - name: list-network-interfaces
              method: GET
              description: "List all NetworkInterface resources"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Azure subscription ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8198
      namespace: azure-networking-services-api
      resources:
        - path: /v1/resources
          name: resources
          description: "Resource management"
          operations:
            - method: GET
              name: list-resources
              description: "List resources"
              call: "azure-networking-services.list-virtual-networks"
              with:
                subscriptionId: "rest.subscriptionId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9198
      namespace: azure-networking-services-mcp
      transport: http
      tools:
        - name: list-virtual-networks
          description: "List VirtualNetwork resources in Azure"
          hints:
            readOnly: true
            openWorld: true
          call: "azure-networking-services.list-virtual-networks"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-subnets
          description: "List Subnet resources in Azure"
          hints:
            readOnly: true
            openWorld: true
          call: "azure-networking-services.list-subnets"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-load-balancers
          description: "List LoadBalancer resources in Azure"
          hints:
            readOnly: true
            openWorld: true
          call: "azure-networking-services.list-load-balancers"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-network-interfaces
          description: "List NetworkInterface resources in Azure"
          hints:
            readOnly: true
            openWorld: true
          call: "azure-networking-services.list-network-interfaces"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
